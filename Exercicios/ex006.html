<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex006</title>
    <style>
        body{
            background: rgb(37, 128, 255);
        }
        div#area{
            font: normal 18pt Arial;
            background: black;
            color: white;
            width: 200px;
            height: 200px;
            line-height: 200px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="area">
        Interaja...
    </div>
    <script>
        let a = window.document.getElementById('area')
        a.addEventListener('mouseenter',enter)
        a.addEventListener('mouseout', sair)

        function enter(){
            a.innerText='Entrou'
           a.style.background = 'green'
        }
        function sair(){
           a.style.background = 'green' 
           a.innerText='Saiu'
        }
    </script>
</body>
</html>
