<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qual seu País</title>
    <style>
        body{
            background-color: rgb(44, 113, 241);
            color: white;
            font: normal 20pt arial;
        }
    </style>
</head>
<body>
    <h1>Qual Seu País?</h1>
    <input type="text" id="txname">
    <input type="button" value="VERIFICAR" onclick="world()">
    <div id="txres"></div>
    <script>
        function world(){
            let pais = document.getElementById('txname').value
            let res = document.getElementById('txres')
            if (pais == 'Brasil'){
                res.innerHTML+=`<p>Você é brasileiro</p>`
            }else{
                res.innerHTML+=`<p> Você é gringo pois mora no(a) ${pais}</p>`
            }
        }
    </script>
</body>
</html>
