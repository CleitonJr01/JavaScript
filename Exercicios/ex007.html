<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex007</title>
    <style>
        body{
            background: rgb(22, 104, 236);
            color: white;
            font: normal 15px Arial;
        }
    </style>
</head>
<body>
   <h1>Somando Valores!</h1> 
   <input type="number" name="tn1" id="tn1">+
   <input type="number" name="tn2" id="tn2">
   <input type="button" value="SOMAR" onclick="somar()">
   <div id="res">RESULTADO</div>

   <script>

    function somar(){
         let tn1 = document.getElementById('tn1')
         let tn2 = document.getElementById('tn2')
         let res = document.getElementById('res')
         let n1 = Number(tn1.value)
         let n2 = Number(tn2.value)
         let s = n1+n2
         res.innerHTML = `A soma entre ${n1} + ${n2} = <strong>${s}</strong>`
    }

   </script>
</body>
</html>
